<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIDER | Premium Auth</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link rel="stylesheet" href="test.css">
</head>
<body>

<div class="container" id="container">
    <div class="form-container sign-up-container">
        <form action="#">
            <h2 class="auth-header__title">Create Account</h2>
            <div class="auth-toggle">
                <button type="button" class="auth-toggle__btn active" data-type="customer">Customer</button>
                <button type="button" class="auth-toggle__btn" data-type="provider">Service Provider</button>
            </div>
            <div class="field-group">
                <input type="text" placeholder="Full Name" class="field-group__input" required />
                <i class="fas fa-user field-group__icon"></i>
            </div>
            <div class="field-group">
                <input type="email" placeholder="Email" class="field-group__input" required />
                <i class="fas fa-envelope field-group__icon"></i>
            </div>
            <div class="field-group">
                <input type="password" placeholder="Password" class="field-group__input" required />
                <i class="fas fa-lock field-group__icon"></i>
            </div>
            <button class="btn btn--action" id="register-submit-btn">Register as Customer</button>
            <div class="social-grid">
                <a href="#" class="social-grid__item"><i class="fab fa-google"></i></a>
                <a href="#" class="social-grid__item"><i class="fab fa-facebook-f"></i></a>
            </div>
        </form>
    </div>

    <div class="form-container sign-in-container">
        <form action="#">
            <h2 class="auth-header__title">Login</h2>
            <div class="auth-toggle">
                <button type="button" class="auth-toggle__btn active" data-type="customer">Customer</button>
                <button type="button" class="auth-toggle__btn" data-type="provider">Service Provider</button>
            </div>
            <div class="field-group">
                <input type="email" placeholder="Email" class="field-group__input" required />
                <i class="fas fa-envelope field-group__icon"></i>
            </div>
            <div class="field-group">
                <input type="password" placeholder="Password" class="field-group__input" required />
                <i class="fas fa-lock field-group__icon"></i>
            </div>
            <a href="#" class="forgot-link">Forgot password?</a>
            <button class="btn btn--action" id="login-submit-btn">Login as Customer</button>
            <div class="social-grid">
                <a href="#" class="social-grid__item"><i class="fab fa-google"></i></a>
                <a href="#" class="social-grid__item"><i class="fab fa-linkedin-in"></i></a>
            </div>
        </form>
    </div>

    <div class="overlay-container">
        <div class="overlay">
            <div class="overlay-panel overlay-left">
                <h1 class="auth-sidebar__title">Welcome Back!</h1>
                <p class="auth-sidebar__text">To keep connected with us please login with your personal info</p>
                <button class="btn btn--ghost" id="signIn">Login Now</button>
            </div>
            <div class="overlay-panel overlay-right">
                <h1 class="auth-sidebar__title">Hello, Welcome!</h1>
                <p class="auth-sidebar__text">Login to access your dashboard and book services.</p>
                <button class="btn btn--ghost" id="signUp">Register Now</button>
            </div>
        </div>
    </div>
</div>

<script src="test.js"></script>
</body>
</html>
